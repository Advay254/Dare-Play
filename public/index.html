<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dare Play</title>
  <link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#00e5ff" />
<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

  <!-- ==================== LOBBY SCREEN ==================== -->
  <div id="lobbyScreen" class="screen lobby active">
    <div class="lobby-title">🎮 DARE . PLAY</div>
    <div class="lobby-subtitle">Video call • Rock Paper Scissors • Dare</div>

    <div class="connection-indicator">
      <span class="dot"></span> Connected
    </div>

    <div class="input-group">
      <label>Your name</label>
      <input type="text" id="playerNameInput" placeholder="Enter your name" maxlength="15" />
    </div>

    <div class="input-group">
      <label>Room code (if joining)</label>
      <input type="text" id="roomCodeInput" placeholder="e.g. AX7B2" maxlength="8" style="text-transform:uppercase;" />
    </div>

    <button class="lobby-btn btn-create" id="createRoomBtn">CREATE ROOM</button>
    <button class="lobby-btn btn-join" id="joinRoomBtn" disabled>JOIN ROOM</button>

    <div class="lobby-footer">
      <a href="#">How to play</a> · <a href="#">About</a>
    </div>
  </div>

  <!-- ==================== GAME SCREEN ==================== -->
  <div id="gameScreen" class="screen">
    <!-- TOP BAR -->
    <div class="top-bar">
      <span class="room-code" id="roomCodeDisplay">Room: ----</span>
      <div class="player-names">
        <span class="player me" id="myNameBadge">
          <span class="status-dot" id="myStatusDot"></span>
          <span id="myName">You</span>
        </span>
        <span class="player" id="opponentBadge">
          <span class="status-dot" id="opponentStatusDot"></span>
          <span id="opponentName">Opponent</span>
        </span>
      </div>
    </div>

    <!-- VIDEO AREA -->
<!-- VIDEO AREA -->
<div class="video-area">
  <div class="video-tile local" id="localVideoContainer">
    <video id="localVideo" autoplay muted playsinline></video>
    <div class="video-placeholder" id="localPlaceholder">📹</div>
    <button class="camera-toggle" id="cameraToggleBtn" title="Toggle camera">📷</button>
  </div>
  <div class="video-tile remote" id="remoteVideoContainer">
    <video id="remoteVideo" autoplay playsinline></video>
    <div class="video-placeholder" id="remotePlaceholder">📹</div>
  </div>
</div>
    <!-- INFO STRIP -->
    <div class="info-strip" id="infoStrip">Choose your move!</div>

    <!-- CONTROL PAD -->
    <div class="control-pad">
      <button class="end-game-btn" id="endGameBtn" title="Leave room">✖</button>

      <div class="circle-group">
        <svg class="ring-svg" viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
          <g class="ring-segment-group" id="rockGroup" style="transform-origin:65px 65px; transform:rotate(0deg);">
            <path class="outer-segment"
                  d="M 65 11
                     A 54 54 0 0 1 111.77 92
                     L 92.71 81
                     A 32 32 0 0 0 65 33 Z" />
            <text class="segment-label" x="102" y="48">🪨</text>
          </g>
          <g class="ring-segment-group" id="paperGroup" style="transform-origin:65px 65px; transform:rotate(120deg);">
            <path class="outer-segment"
                  d="M 65 11
                     A 54 54 0 0 1 111.77 92
                     L 92.71 81
                     A 32 32 0 0 0 65 33 Z" />
            <text class="segment-label" x="102" y="48">📄</text>
          </g>
          <g class="ring-segment-group" id="scissorsGroup" style="transform-origin:65px 65px; transform:rotate(240deg);">
            <path class="outer-segment"
                  d="M 65 11
                     A 54 54 0 0 1 111.77 92
                     L 92.71 81
                     A 32 32 0 0 0 65 33 Z" />
            <text class="segment-label" x="102" y="48">✂️</text>
          </g>
        </svg>
        <button class="center-btn" id="centerBtn">🎤</button>
      </div>

      <button class="dice-toggle" id="diceToggleBtn" title="Dare mode">🎲</button>
    </div>
  </div>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
